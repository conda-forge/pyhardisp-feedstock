{% set version = "0.2.2" %}
{% set python_min = "3.10" %}

package:
  name: pyhardisp
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/pyhardisp/pyhardisp-{{ version }}.tar.gz
  sha256: 137f61a27d5b990816cc49e5f7db351508b76132c163a4f1a292c7f79ea712d1

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=77.0.0
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=1.19.0

test:
  imports:
    - pyhardisp
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/craigmillernz/pyhardisp
  summary: Ocean loading tidal displacement calculator - Python conversion of IERS HARDISP Fortran program
  license: SL
  license_file: LICENCE

extra:
  recipe-maintainers:
    - craigmillernz
